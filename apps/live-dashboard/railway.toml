# Railway configuration for the vectorbt live dashboard.
#
# In the Railway service settings, set "Root Directory" to:
#     apps/live-dashboard
# so that this file, the Dockerfile, and requirements.txt are picked up.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "gunicorn app:server --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
